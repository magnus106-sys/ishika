<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Special for Ishika (MY LADY)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body { background: #000; overflow: hidden; font-family: 'Comic Sans MS', cursive; color: white; }

        /* Binary Matrix Background */
        #matrix { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.6; }

        /* Loader with Glow */
        #loader { 
            position: fixed; width: 100%; height: 100%; display: flex; 
            justify-content: center; align-items: center;
            font-size: 8rem; color: #ff4d6d; z-index: 1000;
            background: #000; text-shadow: 0 0 20px #ff4d6d;
        }

        /* Book Container */
        .book-container { 
            width: 100vw; height: 100vh; display: none; 
            justify-content: center; align-items: center; 
            perspective: 2500px; z-index: 100; position: relative;
        }
        .book { width: 300px; height: 450px; position: relative; transform-style: preserve-3d; }
        .page {
            position: absolute; width: 100%; height: 100%; background: #fffafa; border: 4px solid #ff85a1;
            border-radius: 12px 20px 20px 12px; transform-origin: left; 
            transition: transform 0.8s ease-in-out;
            backface-visibility: hidden; display: flex; flex-direction: column; align-items: center; padding: 25px;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5); 
            background-image: radial-gradient(#ffccd5 1px, transparent 1px); background-size: 15px 15px;
        }
        .flipped { transform: rotateY(-160deg); z-index: 0 !important; }
        .page img { width: 160px; height: 160px; object-fit: contain; margin: 10px 0; border-radius: 10px; background: #eee; }
        h2 { color: #d00000; font-size: 1.3rem; text-align: center; margin-bottom: 5px; }
        p { color: #444; font-weight: bold; text-align: center; margin: 5px 0; font-size: 0.85rem; }

        /* Proposal Section */
        #proposalSection {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px;
        }
        .img-frame {
            width: 280px; height: 280px; border: 4px solid #ff4d6d; border-radius: 20px;
            overflow: hidden; margin-bottom: 20px; box-shadow: 0 0 15px #ff4d6d; background: #222;
        }
        #coupleImg { width: 100%; height: 100%; object-fit: cover; }
        .btn-group { display: flex; gap: 15px; margin-top: 10px; }
        .ans-btn { padding: 10px 30px; border-radius: 25px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        #yesBtn { background: #2ecc71; color: white; }
        #noBtn { background: #e74c3c; color: white; position: relative; }

        .heart { position: fixed; color: #ff4d6d; font-size: 20px; pointer-events: none; animation: fall linear forwards; z-index: 3000; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div id="loader">3</div>

    <div class="book-container" id="bookCont">
        <div class="book">
            <div class="page" id="p4" style="z-index: 1;">
                <img src="https://media.tenor.com/7S8Yx_uGstgAAAAj/tkthao219-bubududu.gif">
                <h2>Ye hui na baat! ❤️</h2>
                <p>Happy Birthday, Ishika (MY LADY)! 🎉</p>
                <button onclick="showProposal()" style="margin-top:15px; padding:10px 20px; background:#ff4d6d; color:white; border:none; border-radius:20px; font-weight:bold;">Click for Surprise ✨</button>
            </div>

            <div class="page" id="p3" style="z-index: 2;">
                <img src="https://media.tenor.com/vH_p1T0h47AAAAAj/peach-cat-dancing.gif">
                <p>Type karo aur Swipe karo:</p>
                <input type="text" id="taskInput" style="width: 100%; padding: 8px; border-radius: 10px; border: 2px solid #ff4d6d; text-align: center; font-size: 0.8rem;" placeholder="Type here...">
                <p style="font-size: 0.7rem; color: #ff4d6d;">"sohel is the best i love you"</p>
                <p style="margin-top: 10px; font-size: 0.7rem;">[ Swipe Left ]</p>
            </div>

            <div class="page" id="p2" style="z-index: 3;">
                <img src="https://media.tenor.com/zW-3A_w5M3oAAAAj/mochi-mochi.gif">
                <h2>Bohot special ho! 🎂</h2>
                <p>Ishika, you are truly amazing! 🎉</p>
                <p style="margin-top: 40px; font-size: 0.7rem;">[ Swipe left ]</p>
            </div>

            <div class="page" id="p1" style="z-index: 4;">
                <h2 style="margin-top: 10px;">To My Lady,</h2>
                <h1 style="color: #ff0055; font-size: 2rem; text-align: center;">ISHIKA</h1>
                <img src="https://media.tenor.com/970R1XoZ_XIAAAAj/mochi-cat-love.gif">
                <p style="font-size: 0.8rem;">Swipe left to open ❤️</p>
            </div>
        </div>
    </div>

    <div id="proposalSection">
        <h2 id="questText" style="margin-bottom: 15px;">Do you love me? 🥺</h2>
        <div class="img-frame">
            <img id="coupleImg" src="https://i.ibb.co/zV2x15cm/de8faf6d7ebf50ac7b67a243b9ddd569.jpg" alt="Hug"> 
        </div>
        <div id="btns" class="btn-group">
            <button id="yesBtn" class="ans-btn" onclick="sayYes()">YES! ❤️</button>
            <button id="noBtn" class="ans-btn" onclick="handleNo()">NO 💔</button>
        </div>
        <p id="msgText" style="margin-top: 15px; color: #ff4d6d; text-align: center; font-weight: bold;"></p>
    </div>

    <script>
        // Matrix Logic
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "01 ISHIKA ❤️";
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff4d6d"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // Countdown & Preloader
        let count = 3;
        const loaderEl = document.getElementById('loader');
        const bookCont = document.getElementById('bookCont');

        const timer = setInterval(() => {
            count--;
            if(count > 0) loaderEl.innerText = count;
            else { 
                clearInterval(timer); 
                loaderEl.style.display = 'none'; 
                bookCont.style.display = 'flex'; 
            }
        }, 1000);

        // Interaction Logic
        let startX = 0; let currentPage = 1;
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches[0].clientX;
            if (startX - endX > 40) {
                if(currentPage === 3) {
                    const input = document.getElementById('taskInput').value.toLowerCase().trim();
                    if(input === "sohel is the best i love you") flip(3);
                } else if(currentPage < 4) {
                    flip(currentPage);
                }
            }
        });

        function flip(id) {
            const p = document.getElementById('p' + id);
            if(p) {
                p.classList.add('flipped');
                currentPage++;
            }
        }

        function showProposal() {
            bookCont.style.display = 'none';
            document.getElementById('proposalSection').style.display = 'flex';
        }

        function handleNo() {
            const btn = document.getElementById('noBtn');
            btn.style.position = 'fixed';
            btn.style.left = Math.random() * 60 + 'vw';
            btn.style.top = Math.random() * 70 + 'vh';
        }

        function sayYes() {
            document.getElementById('questText').innerText = "I knew it! ❤️";
            document.getElementById('coupleImg').src = "https://i.ibb.co/5CP0YCB/9b0be5cc120c5c6507bc9a7462a512ab.jpg";
            document.getElementById('msgText').innerText = "I love you too My Lady! 😘";
            document.getElementById('btns').style.display = 'none';
            
            setInterval(() => {
                const h = document.createElement('div'); h.innerHTML = '❤️'; h.className = 'heart';
                h.style.left = Math.random() * 100 + 'vw'; h.style.animationDuration = Math.random() * 2 + 2 + 's';
                document.body.appendChild(h); setTimeout(() => h.remove(), 4000);
            }, 150);
        }
    </script>
</body>
</html>
